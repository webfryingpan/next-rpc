version: '3.9'

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: discord-rpc-backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - 3000:3000
    depends_on:
      - db

  db:
    image: postgres
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - 5432:5432

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080
